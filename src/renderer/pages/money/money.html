<div class="money-container">

  <!-- Left Sidebar: Period + Stats + Filters -->
  <div class="money-sidebar">
    <div class="money-sidebar-inner">

      <!-- Period Selector -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Period
        </div>
        <div class="money-period-tabs">
          <button class="money-period-btn active" data-period="week">Week</button>
          <button class="money-period-btn" data-period="month">Month</button>
          <button class="money-period-btn" data-period="year">Year</button>
          <button class="money-period-btn" data-period="all">All</button>
        </div>
      </div>

      <!-- Revenue KPI -->
      <div class="money-block money-revenue-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Revenue
        </div>
        <div class="money-kpi-value" id="money-total-revenue">$0.00</div>
        <div class="money-kpi-label" id="money-kpi-period-label">this week</div>
      </div>

      <!-- Mini Stats Grid -->
      <div class="money-stats-grid">
        <div class="money-stat-card">
          <div class="money-stat-num" id="money-tx-count">0</div>
          <div class="money-stat-label">Sales</div>
        </div>
        <div class="money-stat-card">
          <div class="money-stat-num" id="money-avg-sale">$0</div>
          <div class="money-stat-label">Avg Sale</div>
        </div>
        <div class="money-stat-card">
          <div class="money-stat-num" id="money-excl-count">0</div>
          <div class="money-stat-label">Exclusives</div>
        </div>
        <div class="money-stat-card">
          <div class="money-stat-num money-stat-muted" id="money-free-count">0</div>
          <div class="money-stat-label">Free DLs</div>
        </div>
      </div>

      <!-- Type Filter -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Type
        </div>
        <div class="money-filter-pills" id="money-type-filter">
          <button class="money-pill active" data-type="all">All</button>
          <button class="money-pill" data-type="lease">Lease</button>
          <button class="money-pill" data-type="exclusive">Exclusive</button>
          <button class="money-pill" data-type="stem">Stem</button>
          <button class="money-pill" data-type="free">Free DL</button>
        </div>
      </div>

      <!-- Platform Filter -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Platform
        </div>
        <div class="money-filter-pills" id="money-platform-filter">
          <button class="money-pill active" data-platform="all">All</button>
          <button class="money-pill" data-platform="beatstars">Beatstars</button>
          <button class="money-pill" data-platform="airbit">Airbit</button>
          <button class="money-pill" data-platform="direct">Direct</button>
          <button class="money-pill" data-platform="other">Other</button>
        </div>
      </div>

      <!-- Top Beat -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Top Beat
        </div>
        <div class="money-top-beat-name" id="money-top-beat">—</div>
        <div class="money-top-beat-amount" id="money-top-beat-amount"></div>
      </div>

    </div>
  </div>

  <!-- Main Panel: Chart + Transaction List -->
  <div class="money-main">

    <!-- Chart Strip -->
    <div class="money-chart-strip">
      <div class="money-chart-header">
        <span class="money-chart-title" id="money-chart-title">Daily Revenue — This Week</span>
        <div class="money-chart-legend">
          <span><span class="money-legend-dot" style="background:#F59E0B"></span>Lease</span>
          <span><span class="money-legend-dot" style="background:#EF4444"></span>Exclusive</span>
          <span><span class="money-legend-dot" style="background:#6B7280"></span>Free</span>
        </div>
      </div>
      <div class="money-chart-bars" id="money-chart-bars">
        <!-- rendered by JS -->
      </div>
    </div>

    <!-- Transactions Toolbar -->
    <div class="money-tx-toolbar">
      <div class="money-tx-toolbar-left">
        <div class="money-tx-count-badge" id="money-tx-badge">0 transactions</div>
      </div>
      <div class="money-tx-search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="money-search" class="money-search-input" placeholder="Search beat, customer…" />
      </div>
      <select id="money-sort-select" class="money-sort-select">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="amount-desc">Highest amount</option>
        <option value="amount-asc">Lowest amount</option>
      </select>
    </div>

    <!-- Transaction List -->
    <div class="money-tx-list" id="money-tx-list">
      <div class="money-empty-state" id="money-empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <p>No transactions found.<br>Add your first sale to get started!</p>
      </div>
    </div>

  </div>

  <!-- Right Panel: Add Form + Breakdown -->
  <div class="money-right">
    <div class="money-right-inner">

      <!-- Add Transaction -->
      <div class="money-block" id="money-form-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Add Transaction
        </div>
        <div class="money-form">
          <input type="text" id="money-beat-name" class="money-input" placeholder="Beat name *" autocomplete="off" />
          <div class="money-form-row2">
            <select id="money-type-input" class="money-select">
              <option value="lease">Lease</option>
              <option value="exclusive">Exclusive</option>
              <option value="stem">Stem License</option>
              <option value="free">Free Download</option>
            </select>
            <select id="money-platform-input" class="money-select">
              <option value="beatstars">Beatstars</option>
              <option value="airbit">Airbit</option>
              <option value="direct">Direct</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="money-form-row2">
            <div class="money-amount-wrap">
              <span class="money-dollar-sign">$</span>
              <input type="number" id="money-amount-input" class="money-input money-amount-input" placeholder="0.00" min="0" step="0.01" />
            </div>
            <input type="date" id="money-date-input" class="money-input money-date-input" />
          </div>
          <input type="text" id="money-customer-input" class="money-input" placeholder="Customer (optional)" autocomplete="off" />
          <input type="text" id="money-notes-input" class="money-input" placeholder="Notes (optional)" autocomplete="off" />
          <button id="money-add-btn" class="money-add-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="money-btn-label">Add Transaction</span>
          </button>
          <button id="money-cancel-btn" class="money-cancel-btn" style="display:none;">
            Cancel Edit
          </button>
        </div>
      </div>

      <!-- Earnings Breakdown by Type -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          By Type
        </div>
        <div class="money-breakdown-list" id="money-type-breakdown"></div>
      </div>

      <!-- Earnings Breakdown by Platform -->
      <div class="money-block">
        <div class="money-block-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          By Platform
        </div>
        <div class="money-breakdown-list" id="money-platform-breakdown"></div>
      </div>

    </div>
  </div>

</div>
