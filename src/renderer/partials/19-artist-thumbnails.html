<!-- Section: Artist Thumbnail Packs -->
<div class="app-section" id="artists-section">
  <div class="artists-container">
    <aside class="artists-sidebar">
      <div class="artists-header">
        <div>
          <h2>Artist Thumbnails</h2>
          <p>Thumbnail packs by artist</p>
        </div>
        <button id="artist-new-pack-btn" class="btn-secondary artist-icon-btn" title="New Artist Pack">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </div>

      <div class="artist-search-row">
        <input type="text" id="artist-pack-search" class="filter-input" placeholder="Search artists...">
      </div>

      <div class="artist-create-row">
        <input type="text" id="artist-new-pack-input" class="filter-input" placeholder="Artist name, e.g. Isaiah Rashad">
        <button id="artist-create-pack-btn" class="btn-secondary">Create Pack</button>
      </div>

      <div class="artist-pack-stats">
        <div>
          <span id="artist-pack-count">0</span>
          <small>Packs</small>
        </div>
        <div>
          <span id="artist-image-count">0</span>
          <small>Images</small>
        </div>
        <div>
          <span id="artist-used-count">0</span>
          <small>Used</small>
        </div>
      </div>

      <div id="artist-pack-list" class="artist-pack-list"></div>
    </aside>

    <main class="artist-main">
      <div class="artist-main-header">
        <div>
          <span class="artist-kicker">YouTube Thumbnail Library</span>
          <h2 id="artist-selected-title">Select an artist pack</h2>
          <p id="artist-selected-meta">Create packs for artists like Isaiah Rashad, Drake, SZA, and drop fitting thumbnails into each one.</p>
        </div>
        <div class="artist-main-actions">
          <button id="artist-rename-pack-btn" class="btn-secondary" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            Rename
          </button>
          <button id="artist-delete-pack-btn" class="btn-secondary" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
            Delete
          </button>
        </div>
      </div>

      <div id="artist-drop-zone" class="artist-drop-zone">
        <div class="artist-drop-empty" id="artist-drop-empty">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-4.35-4.35a2 2 0 0 0-2.83 0L6 18"/></svg>
          <h3>No artist pack selected</h3>
          <p>Create or select a pack, then drag image files here.</p>
        </div>
        <div id="artist-thumbnail-grid" class="artist-thumbnail-grid"></div>
      </div>
    </main>
  </div>
</div>
