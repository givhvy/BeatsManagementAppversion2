<!-- ============================
     GLOBAL SEARCH OVERLAY
     ============================ -->
<div id="global-search-overlay" class="global-search-overlay" style="display:none;">
  <div class="global-search-backdrop"></div>
  <div class="global-search-dialog">
    <div class="global-search-input-wrap">
      <svg class="global-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="global-search-input" class="global-search-input" placeholder="Search beats, projects, kits, releases..." autocomplete="off" spellcheck="false">
      <kbd class="global-search-kbd">ESC</kbd>
    </div>
    <div id="global-search-results" class="global-search-results">
      <div class="global-search-hint">Start typing to search across all sections...</div>
    </div>
    <div class="global-search-footer">
      <span><kbd>↑↓</kbd> Navigate</span>
      <span><kbd>Enter</kbd> Open</span>
      <span><kbd>Ctrl+K</kbd> Toggle</span>
    </div>
  </div>
</div>
