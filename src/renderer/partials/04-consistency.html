  <!-- Section: Consistency Tracker -->
  <div class="app-section" id="consistency-section">
    <div class="consistency-container">
      <div class="consistency-header">
        <div>
          <h2>
            Upload Consistency
          </h2>
          <p class="consistency-subtitle">Track your daily video uploads to maintain consistency</p>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="consistency-stats">
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div class="stat-content">
            <div class="stat-value" id="longest-streak">0</div>
            <div class="stat-label">Longest Streak</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(168, 85, 247, 0.1); color: #a855f7;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="stat-content">
            <div class="stat-value" id="total-uploads">0</div>
            <div class="stat-label">Total Uploads</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(251, 146, 60, 0.1); color: #fb923c;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            </svg>
          </div>
          <div class="stat-content">
            <div class="stat-value" id="this-month-uploads">0</div>
            <div class="stat-label">This Month</div>
          </div>
        </div>
      </div>

      <!-- Contribution Graph -->
      <div class="contribution-graph-container">
        <div class="contribution-graph-header">
          <h3>Upload Activity</h3>
          <div class="contribution-legend">
            <span>Less</span>
            <div class="legend-box level-0"></div>
            <div class="legend-box level-1"></div>
            <div class="legend-box level-2"></div>
            <div class="legend-box level-3"></div>
            <div class="legend-box level-4"></div>
            <span>More</span>
          </div>
        </div>
        <div class="contribution-graph" id="contribution-graph">
          <!-- Graph will be generated here -->
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="recent-activity">
        <h3>Recent Uploads</h3>
        <div class="activity-list" id="activity-list">
          <div class="empty-state">No uploads tracked yet</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Video Player Modal -->
  <div class="video-player-modal" id="video-player-modal" style="display: none;">
    <div class="video-player-overlay" onclick="closeVideoPlayer()"></div>
    <div class="video-player-container">
      <div class="video-player-header">
        <h3 id="video-player-title">Video Player</h3>
        <button class="video-player-close" onclick="closeVideoPlayer()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="video-player-content">
        <video id="video-player-element" playsinline>
          <source id="video-player-source" src="" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button class="vp-center-button" id="vp-center-play" type="button" aria-label="Play or pause video">
          <svg class="vp-icon-play" width="74" height="74" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="vp-icon-pause" width="74" height="74" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="vp-skip-button vp-skip-back" id="vp-skip-back" type="button" aria-label="Back 10 seconds">
          <svg width="58" height="58" viewBox="0 0 24 24" fill="currentColor"><path d="M11 19V5L2 12l9 7Zm11 0V5l-9 7 9 7Z"/></svg>
        </button>
        <button class="vp-skip-button vp-skip-forward" id="vp-skip-forward" type="button" aria-label="Forward 10 seconds">
          <svg width="58" height="58" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5v14l9-7-9-7ZM2 5v14l9-7-9-7Z"/></svg>
        </button>
        <div class="vp-gradient vp-gradient-top"></div>
        <div class="vp-gradient vp-gradient-bottom"></div>
        <div class="vp-controls">
          <input id="vp-progress" class="vp-progress" type="range" min="0" max="1000" value="0" aria-label="Video progress">
          <div class="vp-control-row">
            <div class="vp-left-controls">
              <button class="vp-control-button" id="vp-play-toggle" type="button" aria-label="Play or pause">
                <svg class="vp-icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg class="vp-icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
              </button>
              <span class="vp-time"><span id="vp-current-time">0:00</span> / <span id="vp-duration">0:00</span></span>
            </div>
            <div class="vp-right-controls">
              <button class="vp-control-button" id="vp-volume-toggle" type="button" aria-label="Mute or unmute">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3Zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12Zm-2.5-9.5v2.06A8 8 0 0 1 18 12a8 8 0 0 1-4 7.44v2.06A10 10 0 0 0 20 12a10 10 0 0 0-6-9.5Z"/></svg>
              </button>
              <span class="vp-setting-label">1x</span>
              <span class="vp-setting-label">720p</span>
              <button class="vp-control-button vp-cc-button" type="button" aria-label="Captions">CC</button>
              <button class="vp-control-button" id="vp-fullscreen" type="button" aria-label="Fullscreen">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
              </button>
              <button class="vp-control-button" type="button" aria-label="More options">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
