  <!-- MODAL: Add / Edit Title Template -->
  <div class="tt-modal-overlay" id="tt-modal-overlay" style="display:none" onclick="ttModalOverlayClick(event)">
    <div class="tt-modal">
      <div class="tt-modal-header">
        <span id="tt-modal-heading">New Template</span>
        <button class="tt-modal-close" onclick="ttCloseModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="tt-modal-body">
        <input type="hidden" id="tt-modal-edit-id">

        <div class="tt-form-row">
          <label class="tt-form-label">Title</label>
          <input type="text" id="tt-modal-title-input" class="tt-form-input" placeholder="YouTube video title" maxlength="100">
          <span class="tt-char-count" id="tt-title-count">0 / 100</span>
        </div>

        <div class="tt-form-row">
          <label class="tt-form-label">Description</label>
          <textarea id="tt-modal-desc-input" class="tt-form-textarea" placeholder="YouTube video description" rows="7" maxlength="5000"></textarea>
          <span class="tt-char-count" id="tt-desc-count">0 / 5000</span>
        </div>

        <div class="tt-form-row">
          <label class="tt-form-label">Tags <span class="tt-form-hint">comma-separated</span></label>
          <input type="text" id="tt-modal-tags-input" class="tt-form-input" placeholder="beats, trap, hip hop, type beat">
        </div>

        <div class="tt-form-row">
          <label class="tt-form-label">Category Label</label>
          <input type="text" id="tt-modal-label-input" class="tt-form-input" placeholder="e.g. Trap, Chill, Promo, Default">
        </div>
      </div>
      <div class="tt-modal-footer">
        <button class="tt-modal-cancel-btn" onclick="ttCloseModal()">Cancel</button>
        <button class="tt-modal-save-btn" onclick="ttSaveTemplate()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Template
        </button>
      </div>
    </div>
  </div>
  <!-- END MODAL -->
