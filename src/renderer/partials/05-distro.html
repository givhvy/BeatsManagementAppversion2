  <!-- Section: DistroKid Uploader -->
  <div class="app-section" id="distro-section">
    <div class="distro-layout">

      <!-- Left: Songs Side Panel -->
      <div class="distro-songs-panel" id="distro-songs-panel">
        <div class="distro-songs-header">
          <div class="distro-songs-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            Songs
          </div>
          <button id="distro-refresh-songs-btn" class="distro-icon-btn" title="Refresh songs">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.12"/></svg>
          </button>
        </div>
        <div class="distro-songs-path" id="distro-songs-path">D:\Songs</div>
        <input type="text" class="distro-songs-search" id="distro-songs-search" placeholder="Filter tracks..." />
        <div class="distro-songs-list" id="distro-songs-list">
          <div class="distro-songs-loading">Loading tracks...</div>
        </div>
      </div>

      <!-- Right: Releases Area -->
      <div class="distro-main">
        <div class="distro-releases">
          <div class="distro-releases-header">
            <h3>Your Releases</h3>
            <div class="distro-filters">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="published">Published</button>
              <button class="filter-btn" data-filter="pending">Pending</button>
              <button class="filter-btn" data-filter="draft">Draft</button>
            </div>
          </div>
          <div class="releases-grid" id="releases-grid"
               ondragover="event.preventDefault(); this.classList.add('drag-over-grid')"
               ondragleave="this.classList.remove('drag-over-grid')"
               ondrop="handleDropOnGrid(event)">
            <div class="empty-state" id="releases-empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                <path d="M2 12h20"/>
              </svg>
              <p>No releases yet</p>
              <p>Drag a track here or drop from D:\Release</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
