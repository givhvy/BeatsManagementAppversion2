<!-- ============================
     GALLERY SECTION
     ============================ -->
<div class="app-section" id="gallery-section">
  <div class="gallery-container">
    <div class="gallery-main">
      <div class="panel-header" style="display: none;">
        <div class="gallery-actions">
          <button id="gallery-select-folder-btn" class="btn-primary gallery-folder-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Select Folder
          </button>
        </div>
      </div>
      <div id="gallery-grid" class="gallery-grid">
        <div class="gallery-empty">Select a folder to load cover arts.</div>
      </div>
    </div>
  </div>
  <div id="gallery-image-modal" class="gallery-image-modal" style="display:none;">
    <button id="gallery-modal-close" class="gallery-modal-close" title="Close">×</button>
    <img id="gallery-modal-image" class="gallery-modal-image" alt="Cover art preview">
  </div>
</div>
